<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scattered Nest</title>
    <meta name="description" content="The Scattered Nest is resting. Be back soon.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple-dark: #A06CC8;
            --purple-deeper: #7B4FA0;
            --teal: #8CD6D8;
            --bg-cream: #FAF8FC;
            --text-dark: #3D2C4E;
            --text-mid: #6B5A7D;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-cream);
            color: var(--text-dark);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
        }
        .wrap {
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .logo {
            max-width: 180px;
            width: 60%;
            height: auto;
            margin: 0 auto 36px;
            display: block;
            opacity: 0.95;
        }
        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(1.8em, 5vw, 2.4em);
            font-weight: 600;
            color: var(--purple-deeper);
            margin-bottom: 20px;
            letter-spacing: 0.01em;
        }
        .accent {
            width: 64px;
            height: 3px;
            background: var(--teal);
            border-radius: 2px;
            margin: 0 auto 24px;
        }
        p {
            font-size: 1.05em;
            color: var(--text-mid);
            font-weight: 300;
            max-width: 380px;
            margin: 0 auto;
        }
        footer {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8em;
            color: var(--text-mid);
            opacity: 0.6;
            font-weight: 300;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <main class="wrap">
        <img class="logo" src="/images/logo-main.png" alt="The Scattered Nest">
        <h1>Resting. Be back soon.</h1>
        <div class="accent"></div>
        <p>The Scattered Nest is taking a quiet pause.</p>
    </main>
    <footer>&copy; The Scattered Nest</footer>
</body>
</html>
